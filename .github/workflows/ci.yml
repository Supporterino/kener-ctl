name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: format
        run: bun run format:check

      - name: test
        run: bun test

      - name: build
        run: bun run build
