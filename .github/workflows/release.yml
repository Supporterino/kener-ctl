name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-x64
            bun-target: bun-linux-x64
            binary: kener-ctl-linux-x64
          - target: linux-arm64
            bun-target: bun-linux-arm64
            binary: kener-ctl-linux-arm64
          - target: darwin-x64
            bun-target: bun-darwin-x64
            binary: kener-ctl-darwin-x64
          - target: darwin-arm64
            bun-target: bun-darwin-arm64
            binary: kener-ctl-darwin-arm64
          - target: win-x64
            bun-target: bun-windows-x64
            binary: kener-ctl-win-x64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: test
        run: bun test

      - name: build
        run: bun build --compile src/cli/index.ts --target=${{ matrix.bun-target }} --outfile dist/${{ matrix.binary }}

      - name: upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist/artifacts

      - name: flatten and checksum
        run: |
          mkdir -p dist/release
          for f in dist/artifacts/*/*; do
            cp "$f" dist/release/
          done
          cd dist/release && sha256sum * > ../checksums.txt
        shell: bash

      - name: generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            dist/release/*
            dist/checksums.txt

      - name: build js for npm
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: check npm version
        id: npm-check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "kener-ctl@$PACKAGE_VERSION" version > /dev/null 2>&1; then
            echo "::warning::Version $PACKAGE_VERSION already exists on npm, skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: publish to npm
        if: steps.npm-check.outputs.skip == 'false'
        run: npm publish --provenance --access public
