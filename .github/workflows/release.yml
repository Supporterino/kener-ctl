name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-x64
            bun-target: bun-linux-x64
            binary: kener-ctl-linux-x64
          - target: linux-arm64
            bun-target: bun-linux-arm64
            binary: kener-ctl-linux-arm64
          - target: darwin-x64
            bun-target: bun-darwin-x64
            binary: kener-ctl-darwin-x64
          - target: darwin-arm64
            bun-target: bun-darwin-arm64
            binary: kener-ctl-darwin-arm64
          - target: win-x64
            bun-target: bun-windows-x64
            binary: kener-ctl-win-x64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: test
        run: bun test

      - name: build
        run: bun build --compile src/cli/index.ts --target=${{ matrix.bun-target }} --outfile dist/${{ matrix.binary }}

      - name: upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary }}
          path: dist/${{ matrix.binary }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/artifacts

      - name: flatten and checksum
        run: |
          mkdir -p dist/release
          for f in dist/artifacts/*/*; do
            cp "$f" dist/release/
          done
          cd dist/release && sha256sum * > ../checksums.txt
        shell: bash

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/release/*
            dist/checksums.txt

  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: update formula
        env:
          GH_TOKEN: ${{ github.token }}
          TAP_REPO_TOKEN: ${{ secrets.TAP_REPO_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          gh release download "$TAG" \
            -p "kener-ctl-darwin-arm64" \
            -p "kener-ctl-darwin-x64" \
            --dir binaries

          ARM64_SHA=$(sha256sum binaries/kener-ctl-darwin-arm64 | cut -d' ' -f1)
          X64_SHA=$(sha256sum binaries/kener-ctl-darwin-x64 | cut -d' ' -f1)

          git clone \
            "https://${TAP_REPO_TOKEN}@github.com/supporterino/homebrew-kener-ctl.git" \
            tap-repo

          cat > tap-repo/Formula/kener-ctl.rb << 'ENDOFFORMULA'
          class KenerCtl < Formula
            desc "Declarative CLI for Kener status pages"
            homepage "https://github.com/supporterino/kener-ctl"
            version "VERSION_PLACEHOLDER"
            license "GPL-3.0-only"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/supporterino/kener-ctl/releases/download/v#{version}/kener-ctl-darwin-arm64"
                sha256 "ARM64_PLACEHOLDER"
              else
                url "https://github.com/supporterino/kener-ctl/releases/download/v#{version}/kener-ctl-darwin-x64"
                sha256 "X64_PLACEHOLDER"
              end
            end

            def install
              bin.install Dir["kener-ctl-*"].first => "kener-ctl"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/kener-ctl --version")
            end
          end
          ENDOFFORMULA

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" tap-repo/Formula/kener-ctl.rb
          sed -i "s/ARM64_PLACEHOLDER/${ARM64_SHA}/g" tap-repo/Formula/kener-ctl.rb
          sed -i "s/X64_PLACEHOLDER/${X64_SHA}/g" tap-repo/Formula/kener-ctl.rb

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/kener-ctl.rb
          git commit -m "chore: bump to v${VERSION}" || echo "No changes to commit"
          git push origin main

